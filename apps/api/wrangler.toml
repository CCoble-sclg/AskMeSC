name = "askmesc-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
account_id = "b7680574a286abd8f82bbb70e52d9684"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "askmesc-db"
database_id = "4a42210a-de2e-4711-af94-eb232f4fb336"

# R2 Storage binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "askmesc-storage"

# Vectorize binding for RAG
[[vectorize]]
binding = "VECTORS"
index_name = "askmesc-index"

# Workers AI binding
[ai]
binding = "AI"

# Environment variables (secrets should use wrangler secret)
[vars]
ENVIRONMENT = "development"

# Required secrets (set via wrangler secret put):
# - SYNC_API_KEY: API key for sync service authentication
# - ANTHROPIC_API_KEY: Anthropic Claude API key for LLM generation
# - AZURE_FUNCTION_URL: URL of the Azure Function SQL proxy
# - AZURE_FUNCTION_KEY: API key for the Azure Function

# Rate limiting
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 100, period = 60 }
