name = "askmesc-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "askmesc-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after running: npm run db:create

# R2 Storage binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "askmesc-storage"

# Vectorize binding for RAG
[[vectorize]]
binding = "VECTORS"
index_name = "askmesc-index"

# Workers AI binding
[ai]
binding = "AI"

# Environment variables (secrets should use wrangler secret)
[vars]
ENVIRONMENT = "development"

# Rate limiting
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 100, period = 60 }
